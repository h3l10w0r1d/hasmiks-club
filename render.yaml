services:
  - type: web
    name: hasmiks-club-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: hasmiks-club-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 129600 # 90 days
      - key: ALLOWED_ORIGINS
        value: https://hasmiks.club,https://www.hasmiks.club
      - key: ADMIN_EMAIL
        value: ""
      # Brevo — CRM contact sync only. Set in the Render dashboard (sync:false so it
      # survives deploys instead of being wiped by a blueprint value:"").
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      # Resend — transactional email. Set in the Render dashboard.
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_SENDER_EMAIL
        sync: false
      - key: RESEND_SENDER_NAME
        sync: false
      # Stripe (payments)
      - key: STRIPE_SECRET_KEY
        value: ""
      - key: STRIPE_WEBHOOK_SECRET
        value: ""
      - key: STRIPE_PRICE_ID
        value: ""
      - key: STRIPE_SUCCESS_URL
        value: https://hasmiks.club/dashboard
      - key: STRIPE_CANCEL_URL
        value: https://hasmiks.club/events
      # Cloudinary (photo uploads) — set these as secrets in the Render dashboard.
      # sync:false keeps dashboard values from being wiped on each deploy.
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Giphy forum GIF picker — free key from developers.giphy.com
      - key: GIPHY_API_KEY
        sync: false

databases:
  - name: hasmiks-club-db
    databaseName: hasmiks_club
    plan: free
